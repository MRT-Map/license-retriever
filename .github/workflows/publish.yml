name: Publish
on:
  workflow_dispatch:
  push:
    tags: ["**"]

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions: 
      contents: read

  version-changelog:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - id: version
        run: echo "version=$(cargo pkgid | cut -d '#' -f 2)" >> "$GITHUB_OUTPUT"
      - id: changelog
        run: |
          {
          echo 'changelog<<__EOF__'
          python -c "
          import os
          print('\n'.join(open('CHANGELOG.md').read().split('## v' + os.environ['VERSION'])[1].split('\n')[1:]).split('\n##')[0])
          "
          echo __EOF__
          } >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.version.outputs.version }}

  github-release:
    runs-on: ubuntu-latest
    needs: [test, version-changelog]
    if: github.event_name != 'pull_request' && !startsWith(github.ref_name, 'renovate/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          cache: false
          envs: ''
      - run: cargo package --locked
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2  # zizmor: ignore[superfluous-actions]
        with:
          tag_name: v${{ needs.version-changelog.outputs.version }}
          name: v${{ needs.version-changelog.outputs.version }}
          body: ${{ needs.version-changelog.outputs.changelog }}
          files: target/package/*.crate
          generate_release_notes: true

  crates-io:
    runs-on: ubuntu-latest
    needs: test
    environment: crates
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  delete-github-release:
    runs-on: ubuntu-slim
    needs: [ test, version-changelog, github-release, crates-io ]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: gh release delete "v$TAG" --cleanup-tag -y
        env:
          TAG: ${{ needs.version-changelog.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true